<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexorah — Demande de devis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B1220;
    --bg-card: #131C2E;
    --text: #F1F5F9;
    --text-muted: #8B98AF;
    --indigo: #4F46E5;
    --cyan: #22D3EE;
    --line: #1E293B;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  h1, .logo-word { font-family: 'Space Grotesk', sans-serif; }
  a { color: inherit; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 40px;
    max-width: 480px;
    width: 100%;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .logo-word { font-size: 18px; font-weight: 700; }

  h1 {
    font-size: 26px;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 15px;
    margin-bottom: 28px;
  }

  .offer-pill {
    display: inline-block;
    background: linear-gradient(135deg, var(--indigo), var(--cyan));
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
    margin-top: 18px;
  }

  label:first-of-type { margin-top: 0; }

  input, textarea, select {
    width: 100%;
    background: #0F1828;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s ease;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--cyan);
  }

  textarea { resize: vertical; min-height: 90px; }

  button {
    width: 100%;
    margin-top: 26px;
    background: linear-gradient(135deg, var(--indigo), var(--cyan));
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 9px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  button:hover { transform: translateY(-2px); }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .confirmation {
    display: none;
    text-align: center;
  }

  .confirmation.show { display: block; }

  .check-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--indigo), var(--cyan));
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .card.hide-form form { display: none; }

  .confirmation h1 { margin-bottom: 12px; }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="brand">
    <svg width="26" height="26" viewBox="0 0 200 200" fill="none">
      <rect x="10" y="10" width="180" height="180" rx="40" fill="#111827"/>
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#4F46E5"/>
          <stop offset="100%" stop-color="#22D3EE"/>
        </linearGradient>
      </defs>
      <path d="M 62 148 L 62 92 L 84 92 L 84 122 L 116 92 L 138 92 L 138 148 L 116 148 L 116 118 L 84 148 Z" fill="url(#g1)"/>
    </svg>
    <span class="logo-word">Nexorah</span>
  </div>

  <div id="formSection">
    <div class="offer-pill" id="offerPill">Demande de devis</div>
    <h1>Parlons de votre projet</h1>
    <p class="subtitle">Laissez vos coordonnées, je vous recontacte rapidement.</p>

    <form id="contactForm" action="https://formspree.io/f/xnjepgqw" method="POST">
      <input type="hidden" name="Offre choisie" id="offerField" value="Non précisée">

      <label for="nom">Nom et prénom</label>
      <input type="text" id="nom" name="Nom" required>

      <label for="commerce">Nom du commerce</label>
      <input type="text" id="commerce" name="Commerce" required>

      <label for="telephone">Téléphone</label>
      <input type="tel" id="telephone" name="Téléphone" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="Email" required>

      <label for="message">Message (optionnel)</label>
      <textarea id="message" name="Message" placeholder="Parlez-moi un peu de votre commerce et de vos besoins..."></textarea>

      <button type="submit">Envoyer ma demande</button>
    </form>

    <a href="index.html" class="back-link">← Retour au site</a>
  </div>

  <div class="confirmation" id="confirmation">
    <div class="check-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <path d="M5 13l4 4L19 7" stroke="#0B1220" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Demande bien reçue !</h1>
    <p class="subtitle">Merci, votre demande a bien été prise en charge. Je vous recontacte au plus vite pour en discuter.</p>
    <a href="index.html" class="back-link">← Retour au site</a>
  </div>
</div>

<script>
  // Pré-remplir l'offre choisie depuis l'URL (?offre=Standard)
  const params = new URLSearchParams(window.location.search);
  const offre = params.get('offre');
  if (offre) {
    document.getElementById('offerPill').textContent = 'Offre ' + offre;
    document.getElementById('offerField').value = offre;
  }

  // Envoi du formulaire en AJAX pour afficher une confirmation sans recharger
  const form = document.getElementById('contactForm');
  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const data = new FormData(form);
    try {
      const response = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (response.ok) {
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('confirmation').classList.add('show');
      } else {
        alert("Une erreur est survenue, réessayez ou appelez directement le 06 03 75 70 61.");
      }
    } catch (err) {
      alert("Une erreur est survenue, réessayez ou appelez directement le 06 03 75 70 61.");
    }
  });
</script>

</body>
</html>
